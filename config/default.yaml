# 全局配置文件
# CLosed-loop Robust Vision-Language Model guided Trajectory Diffusion Policy

project_name: "CLR-VLMTDP"
version: "v1.0"

# 路径配置
paths:
  data_dir: "data"
  weights_dir: "weights"
  checkpoint_dir: "weights/checkpoints"
  log_dir: "logs"
  cache_dir: "cache"

# 设备配置
device:
  device: "cuda"
  gpu_id: 0
  num_workers: 4

# VLM配置
vlm:
  # 后端选择：openai（默认，OpenAI 兼容 HTTP API）或 local（离线 LLaVA 占位）
  backend: "openai"
  api_key: "${OPENAI_API_KEY}"     # 构造时从环境变量读取
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"             # 切换更强模型：gpt-4o, gpt-4-vision-preview
  image_max_side: 512              # 上传前最长边缩放，省 token
  temperature: 0.0
  timeout: 30
  max_retries: 2
  max_new_tokens: 512
  # 兼容 LocalLLaVAWrapper 的旧字段（backend=local 时使用）
  load_in_4bit: true
  cache_dir: "cache/vlm"

# 图像配置
image:
  height: 600
  width: 800
  channels: 3

# 体素配置
voxel:
  size: 6  # 6x6x6
  feature_dim: 128

# 机器人配置
robot:
  num_joints: 7
  action_dim: 7
  gripper_dim: 1

# 闭环控制配置
closed_loop:
  check_interval: 5  # 每5步检查一次
  deviation_threshold: 0.15  # 偏差阈值
  max_replan_attempts: 3  # 最大重规划次数

# 数据集配置
dataset:
  name: "rlbench"
  tasks: []  # 空列表表示所有任务
  num_demos_per_task: 100
  train_split: 0.8

# 日志配置
logging:
  wandb_project: "clr-vlmtdp"
  wandb_entity: null
  log_every: 10
  save_every: 1000